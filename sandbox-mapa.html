<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MapGestión · Simulador de Patio (Demo)</title>

<!-- Tailwind (Play CDN) -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- Inter + Material Symbols -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet">

<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
        keyframes: {
          feedIn: { '0%': { opacity: '0', transform: 'translateY(-10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
          popIn:  { '0%': { opacity: '0', transform: 'scale(.96)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
          bump:   { '0%,100%': { transform: 'scale(1)' }, '40%': { transform: 'scale(1.18)' } },
        },
        animation: {
          'feed-in': 'feedIn .45s ease-out',
          'pop-in':  'popIn .14s ease-out',
          'bump':    'bump .35s ease-out',
        },
      },
    },
  };
</script>
<style>
  body { font-family: 'Inter', sans-serif; }
  .material-symbols-outlined { font-family: 'Material Symbols Outlined'; line-height: 1; }
  /* scrollbar fina para la bitácora */
  .mg-scroll::-webkit-scrollbar { width: 6px; }
  .mg-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 9999px; }
  .mg-scroll::-webkit-scrollbar-track { background: transparent; }
</style>
</head>

<body class="bg-slate-100 p-4 sm:p-8">

<!-- ══════════════════════════════════════════════════════════════
     SANDBOX — copiar/pegar este bloque + el <script> del final.
     Requiere Tailwind (CDN), Inter y Material Symbols cargados arriba.
     ══════════════════════════════════════════════════════════════ -->
<div id="mg-sandbox"
     class="relative mx-auto max-w-6xl overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-2xl shadow-slate-300/40">

  <!-- Barra tipo app -->
  <header class="flex items-center justify-between gap-3 border-b border-slate-200 bg-slate-50/80 px-4 py-2.5">
    <div class="flex items-center gap-3">
      <div class="hidden items-center gap-1.5 sm:flex">
        <span class="h-3 w-3 rounded-full bg-red-400"></span>
        <span class="h-3 w-3 rounded-full bg-amber-400"></span>
        <span class="h-3 w-3 rounded-full bg-emerald-400"></span>
      </div>
      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-[20px] text-blue-600">map</span>
        <span class="text-sm font-extrabold tracking-tight text-slate-800">MapGestión</span>
        <span class="hidden text-xs font-semibold text-slate-400 sm:inline">· Patio Sucursal Centro</span>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <span class="inline-flex items-center gap-1.5 rounded-full bg-emerald-50 px-2.5 py-1 text-[11px] font-bold text-emerald-700">
        <span class="relative flex h-2 w-2">
          <span class="absolute inline-flex h-full w-full animate-ping rounded-full bg-emerald-400 opacity-75"></span>
          <span class="relative inline-flex h-2 w-2 rounded-full bg-emerald-500"></span>
        </span>
        En vivo
      </span>
      <button id="mg-toggle"
        class="inline-flex items-center gap-1 rounded-full border border-slate-200 bg-white px-2.5 py-1 text-[11px] font-bold text-slate-600 transition hover:bg-slate-50">
        <span class="material-symbols-outlined text-[16px]" id="mg-toggle-icon">pause</span>
        <span id="mg-toggle-label">Auto-demo</span>
      </button>
    </div>
  </header>

  <!-- Cuerpo: mapa + panel operativo -->
  <div class="grid grid-cols-1 gap-4 bg-slate-50 p-4 lg:grid-cols-[1.7fr_1fr] lg:gap-5 lg:p-5">

    <!-- ── Panel del mapa ─────────────────────────────────────── -->
    <div class="min-w-0">
      <div class="mb-3 flex items-center justify-between">
        <h3 class="text-sm font-extrabold text-slate-800">Mapa del patio</h3>
        <div class="flex flex-wrap items-center gap-3 text-[10px] font-semibold text-slate-500">
          <span class="flex items-center gap-1"><span class="h-2 w-2 rounded-full bg-emerald-500"></span>Listo</span>
          <span class="flex items-center gap-1"><span class="h-2 w-2 rounded-full bg-amber-500"></span>Preparación</span>
          <span class="flex items-center gap-1"><span class="h-2 w-2 rounded-full bg-red-500"></span>Taller</span>
          <span class="flex items-center gap-1"><span class="h-2 w-2 rounded-full bg-blue-500"></span>Contrato</span>
        </div>
      </div>
      <div class="overflow-x-auto">
        <div id="mg-map" class="grid min-w-[520px] grid-cols-1 gap-3 sm:grid-cols-2 xl:grid-cols-3"></div>
      </div>
    </div>

    <!-- ── Panel operativo (sidebar) ──────────────────────────── -->
    <aside class="flex min-w-0 flex-col gap-4">

      <!-- Métricas rápidas -->
      <div class="grid grid-cols-2 gap-3">
        <div class="rounded-xl border border-slate-200 bg-white p-3 shadow-sm">
          <div class="flex items-center gap-1.5 text-[11px] font-bold text-slate-400">
            <span class="material-symbols-outlined text-[16px] text-slate-400">inventory_2</span> Total
          </div>
          <p id="mg-count-total" class="mt-1 text-2xl font-extrabold text-slate-800">0</p>
        </div>
        <div class="rounded-xl border border-slate-200 bg-white p-3 shadow-sm">
          <div class="flex items-center gap-1.5 text-[11px] font-bold text-slate-400">
            <span class="material-symbols-outlined text-[16px] text-emerald-500">check_circle</span> Listas
          </div>
          <p id="mg-count-listo" class="mt-1 text-2xl font-extrabold text-emerald-600">0</p>
        </div>
        <div class="rounded-xl border border-slate-200 bg-white p-3 shadow-sm">
          <div class="flex items-center gap-1.5 text-[11px] font-bold text-slate-400">
            <span class="material-symbols-outlined text-[16px] text-amber-500">local_car_wash</span> En prep.
          </div>
          <p id="mg-count-prep" class="mt-1 text-2xl font-extrabold text-amber-600">0</p>
        </div>
        <div class="rounded-xl border border-slate-200 bg-white p-3 shadow-sm">
          <div class="flex items-center gap-1.5 text-[11px] font-bold text-slate-400">
            <span class="material-symbols-outlined text-[16px] text-red-500">build</span> En taller
          </div>
          <p id="mg-count-taller" class="mt-1 text-2xl font-extrabold text-red-600">0</p>
        </div>
      </div>

      <!-- Bitácora en vivo -->
      <div class="flex min-h-0 flex-1 flex-col rounded-xl border border-slate-200 bg-white shadow-sm">
        <div class="flex items-center justify-between border-b border-slate-100 px-3 py-2.5">
          <h3 class="flex items-center gap-1.5 text-sm font-extrabold text-slate-800">
            <span class="material-symbols-outlined text-[18px] text-blue-600">history</span> Bitácora en vivo
          </h3>
          <span class="text-[10px] font-bold uppercase tracking-wide text-slate-400">Últimos movimientos</span>
        </div>
        <ul id="mg-feed" class="mg-scroll max-h-[340px] flex-1 overflow-y-auto lg:max-h-[420px]"></ul>
      </div>

    </aside>
  </div>

  <!-- Popover de detalle (posicionado por JS) -->
  <div id="mg-popover"
       class="absolute z-30 hidden w-64 max-w-[calc(100vw-2rem)] rounded-xl border border-slate-200 bg-white p-4 shadow-2xl animate-pop-in"></div>

  <span class="pointer-events-none absolute bottom-2 right-3 select-none text-[10px] font-semibold text-slate-300">Modo demo · datos simulados</span>
</div>

<script>
(() => {
  // ── Configuración de estados ──────────────────────────────────
  const STATUS = {
    listo:       { label: 'Listo',        tile: 'bg-emerald-50 border-emerald-300', icon: 'text-emerald-600', dot: 'bg-emerald-500', badge: 'bg-emerald-100 text-emerald-700' },
    preparacion: { label: 'Preparación',  tile: 'bg-amber-50 border-amber-300',     icon: 'text-amber-600',   dot: 'bg-amber-500',   badge: 'bg-amber-100 text-amber-700' },
    incidencia:  { label: 'Incidencia',   tile: 'bg-red-50 border-red-300',         icon: 'text-red-600',     dot: 'bg-red-500',     badge: 'bg-red-100 text-red-700' },
    asignado:    { label: 'Contrato',     tile: 'bg-blue-50 border-blue-300',       icon: 'text-blue-600',    dot: 'bg-blue-500',    badge: 'bg-blue-100 text-blue-700' },
  };
  const STATUS_KEYS = Object.keys(STATUS);
  const OPERARIOS = ['Carlos M.', 'Ana R.', 'Luis P.', 'Miguel T.', 'Sofía G.', 'José Luis'];

  // ── Layout de zonas + unidades (mock data) ────────────────────
  const ZONE_DEFS = [
    { id: 'entrada', name: 'Entrada',              icon: 'login',          cajones: ['E-01', 'E-02', 'E-03', 'E-04'] },
    { id: 'prep',    name: 'Preparación / Lavado', icon: 'local_car_wash', cajones: ['P-01', 'P-02', 'P-03', 'P-04', 'P-05', 'P-06'] },
    { id: 'taller',  name: 'Taller',               icon: 'build',          cajones: ['T-01', 'T-02', 'T-03', 'T-04'] },
    { id: 'listos',  name: 'Listos para Renta',    icon: 'check_circle',   cajones: ['L-01', 'L-02', 'L-03', 'L-04', 'L-05', 'L-06', 'L-07', 'L-08'] },
    { id: 'salida',  name: 'Salida / Contratos',   icon: 'logout',         cajones: ['S-01', 'S-02', 'S-03', 'S-04'] },
  ];

  const UNIT_LIST = [
    { id: 'u1',  modelo: 'Nissan March',   placas: 'MHV-42-19', type: 'auto',   status: 'listo',       operador: 'Ana R.',    cajon: 'L-01' },
    { id: 'u2',  modelo: 'Nissan Versa',   placas: 'NKT-88-02', type: 'auto',   status: 'preparacion', operador: 'Carlos M.', cajon: 'P-01' },
    { id: 'u3',  modelo: 'Chevrolet Aveo', placas: 'PBR-15-77', type: 'auto',   status: 'incidencia',  operador: 'Luis P.',   cajon: 'T-01' },
    { id: 'u4',  modelo: 'VW Vento',       placas: 'RTX-30-45', type: 'auto',   status: 'asignado',    operador: 'Sofía G.',  cajon: 'S-01' },
    { id: 'u5',  modelo: 'Kia Rio',        placas: 'JLP-77-11', type: 'auto',   status: 'listo',       operador: 'Miguel T.', cajon: 'L-02' },
    { id: 'u6',  modelo: 'Toyota Hilux',   placas: 'HGT-05-88', type: 'camion', status: 'preparacion', operador: 'José Luis', cajon: 'P-02' },
    { id: 'u7',  modelo: 'Nissan NP300',   placas: 'KLM-21-63', type: 'camion', status: 'listo',       operador: 'Ana R.',    cajon: 'L-03' },
    { id: 'u8',  modelo: 'Ford Transit',   placas: 'TRN-99-40', type: 'camion', status: 'asignado',    operador: 'Carlos M.', cajon: 'S-02' },
    { id: 'u9',  modelo: 'Hino 300',       placas: 'HNO-30-12', type: 'camion', status: 'incidencia',  operador: 'Luis P.',   cajon: 'T-02' },
    { id: 'u10', modelo: 'Suzuki Swift',   placas: 'SWF-14-25', type: 'auto',   status: 'listo',       operador: 'Miguel T.', cajon: 'L-04' },
    { id: 'u11', modelo: 'Renault Kwid',   placas: 'KWD-60-33', type: 'auto',   status: 'preparacion', operador: 'Sofía G.',  cajon: 'P-03' },
    { id: 'u12', modelo: 'Mazda 3',        placas: 'MZD-03-71', type: 'auto',   status: 'listo',       operador: 'Ana R.',    cajon: 'L-05' },
    { id: 'u13', modelo: 'VW Saveiro',     placas: 'SAV-45-90', type: 'auto',   status: 'preparacion', operador: 'José Luis', cajon: 'E-01' },
    { id: 'u14', modelo: 'MG 5',           placas: 'MG5-51-08', type: 'auto',   status: 'asignado',    operador: 'Carlos M.', cajon: 'S-03' },
    { id: 'u15', modelo: 'Kenworth T680',  placas: 'KNW-68-00', type: 'camion', status: 'incidencia',  operador: 'Luis P.',   cajon: 'T-03' },
    { id: 'u16', modelo: 'Nissan March',   placas: 'MHV-77-52', type: 'auto',   status: 'listo',       operador: 'Miguel T.', cajon: 'L-06' },
    { id: 'u17', modelo: 'Chevrolet Aveo', placas: 'AVO-22-14', type: 'auto',   status: 'preparacion', operador: 'Ana R.',    cajon: 'E-02' },
  ];

  // ── Estado central ────────────────────────────────────────────
  const appState = { units: {}, zones: [], feed: [] };

  (function build() {
    const cajonToZone = {};
    ZONE_DEFS.forEach(z => z.cajones.forEach(c => (cajonToZone[c] = z.name)));
    const byCajon = {};
    UNIT_LIST.forEach(u => { u.zoneName = cajonToZone[u.cajon]; appState.units[u.id] = u; byCajon[u.cajon] = u.id; });
    appState.zones = ZONE_DEFS.map(z => ({
      id: z.id, name: z.name, icon: z.icon,
      slots: z.cajones.map(c => ({ cajon: c, unitId: byCajon[c] || null })),
    }));
  })();

  // ── Helpers ───────────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const rand = n => Math.floor(Math.random() * n);
  const pick = arr => arr[rand(arr.length)];
  const container = $('mg-sandbox');
  const veh = u => (u.type === 'camion' ? 'local_shipping' : 'directions_car');
  const fmtTime = d => d.toLocaleTimeString('es-MX', { hour: 'numeric', minute: '2-digit', hour12: true });

  function findSlot(unitId) {
    for (const z of appState.zones)
      for (const s of z.slots)
        if (s.unitId === unitId) return { zone: z, slot: s };
    return null;
  }
  function emptySlots(exceptZoneId) {
    const out = [];
    for (const z of appState.zones) {
      if (z.id === exceptZoneId) continue;
      for (const s of z.slots) if (!s.unitId) out.push({ zone: z, slot: s });
    }
    return out;
  }

  // ── Render: mapa ──────────────────────────────────────────────
  function slotHTML(slot, highlightId) {
    if (!slot.unitId) {
      return `<div class="flex h-14 items-center justify-center rounded-lg border border-dashed border-slate-200 text-[10px] font-semibold text-slate-300">${slot.cajon}</div>`;
    }
    const u = appState.units[slot.unitId];
    const s = STATUS[u.status];
    const hl = slot.unitId === highlightId ? 'animate-bump ring-2 ring-slate-400/60' : '';
    return `
      <button data-unit="${u.id}" title="${u.modelo} · ${u.placas}"
        class="mg-unit group flex h-14 flex-col justify-between rounded-lg border ${s.tile} ${hl} px-2 py-1.5 text-left transition hover:-translate-y-0.5 hover:shadow-md">
        <div class="flex items-center justify-between">
          <span class="material-symbols-outlined text-[16px] ${s.icon}">${veh(u)}</span>
          <span class="h-2 w-2 rounded-full ${s.dot}"></span>
        </div>
        <span class="truncate text-[11px] font-extrabold leading-none text-slate-700">${u.placas}</span>
      </button>`;
  }

  function renderMap(highlightId) {
    $('mg-map').innerHTML = appState.zones.map(z => {
      const filled = z.slots.filter(s => s.unitId).length;
      return `
      <section class="rounded-xl border border-slate-200 bg-white p-3 shadow-sm">
        <header class="mb-2 flex items-center justify-between">
          <div class="flex items-center gap-1.5">
            <span class="material-symbols-outlined text-[18px] text-slate-400">${z.icon}</span>
            <h4 class="text-xs font-bold uppercase tracking-wide text-slate-500">${z.name}</h4>
          </div>
          <span class="text-[10px] font-bold text-slate-400">${filled}/${z.slots.length}</span>
        </header>
        <div class="grid grid-cols-2 gap-2">
          ${z.slots.map(s => slotHTML(s, highlightId)).join('')}
        </div>
      </section>`;
    }).join('');
  }

  // ── Render: métricas ──────────────────────────────────────────
  function bump(el) { el.classList.remove('animate-bump'); void el.offsetWidth; el.classList.add('animate-bump'); }
  function setCount(id, val) {
    const el = $(id);
    if (el.textContent !== String(val)) { el.textContent = val; bump(el); }
  }
  function renderMetrics() {
    const c = { listo: 0, preparacion: 0, incidencia: 0, asignado: 0 };
    Object.values(appState.units).forEach(u => c[u.status]++);
    setCount('mg-count-total', Object.keys(appState.units).length);
    setCount('mg-count-listo', c.listo);
    setCount('mg-count-prep', c.preparacion);
    setCount('mg-count-taller', c.incidencia);
  }

  // ── Bitácora ──────────────────────────────────────────────────
  function feedHTML(text, status, time) {
    const dot = (STATUS[status] || {}).dot || 'bg-slate-400';
    return `
      <li class="animate-feed-in flex gap-2.5 border-b border-slate-100 px-3 py-2 last:border-0">
        <span class="mt-1 h-2 w-2 shrink-0 rounded-full ${dot}"></span>
        <div class="min-w-0">
          <p class="text-[12px] leading-snug text-slate-700">${text}</p>
          <span class="text-[10px] font-semibold text-slate-400">${time}</span>
        </div>
      </li>`;
  }
  function pushFeed(text, status) {
    const feed = $('mg-feed');
    feed.insertAdjacentHTML('afterbegin', feedHTML(text, status, fmtTime(new Date())));
    while (feed.children.length > 30) feed.lastElementChild.remove();
  }
  function seedFeed() {
    const now = Date.now();
    const seed = [
      { text: '<b>Ana R.</b> recibió <b>Chevrolet Aveo</b> · AVO-22-14 en Entrada', status: 'preparacion', ago: 2 },
      { text: '<b>Miguel T.</b> marcó <b>Suzuki Swift</b> · SWF-14-25 como <b>Listo</b>', status: 'listo', ago: 5 },
      { text: '<b>Luis P.</b> reportó incidencia en <b>Hino 300</b> · HNO-30-12', status: 'incidencia', ago: 9 },
      { text: '<b>Carlos M.</b> asignó <b>Ford Transit</b> · TRN-99-40 a contrato', status: 'asignado', ago: 13 },
    ];
    $('mg-feed').innerHTML = seed
      .map(e => feedHTML(e.text, e.status, fmtTime(new Date(now - e.ago * 60000))))
      .join('');
  }

  // ── Mutaciones ────────────────────────────────────────────────
  function setStatus(unitId, status, actor) {
    const u = appState.units[unitId];
    if (!u || u.status === status) return;
    u.status = status;
    renderMap(unitId);
    renderMetrics();
    pushFeed(`<b>${actor}</b> marcó <b>${u.modelo}</b> · ${u.placas} como <b>${STATUS[status].label}</b>`, status);
    if (openUnitId === unitId) fillPopover(u);
  }

  function moveUnit(unitId, actor) {
    const u = appState.units[unitId];
    const cur = findSlot(unitId);
    if (!cur) return false;
    const targets = emptySlots(cur.zone.id);
    if (!targets.length) return false;
    const t = pick(targets);
    cur.slot.unitId = null;
    t.slot.unitId = unitId;
    u.cajon = t.slot.cajon;
    u.zoneName = t.zone.name;
    renderMap(unitId);
    pushFeed(`<b>${actor}</b> movió <b>${u.modelo}</b> · ${u.placas} a ${t.zone.name} (${t.slot.cajon})`, u.status);
    if (openUnitId === unitId) fillPopover(u);
    return true;
  }

  // ── Popover ───────────────────────────────────────────────────
  let openUnitId = null;

  function actionBtn(u, key, label) {
    const s = STATUS[key];
    const active = u.status === key;
    const cls = active
      ? `${s.badge} border-transparent`
      : 'border-slate-200 text-slate-600 hover:bg-slate-50';
    return `<button data-set-status="${key}" class="flex items-center justify-center gap-1 rounded-lg border px-2 py-1.5 text-[11px] font-bold ${cls}">
        <span class="h-1.5 w-1.5 rounded-full ${s.dot}"></span>${label}</button>`;
  }

  function fillPopover(u) {
    const s = STATUS[u.status];
    $('mg-popover').innerHTML = `
      <div class="flex items-start justify-between gap-2">
        <div class="flex min-w-0 items-center gap-2">
          <span class="material-symbols-outlined text-[24px] ${s.icon}">${veh(u)}</span>
          <div class="min-w-0">
            <p class="truncate text-sm font-extrabold text-slate-800">${u.modelo}</p>
            <p class="font-mono text-xs font-bold text-slate-500">${u.placas}</p>
          </div>
        </div>
        <button data-close-pop class="text-slate-400 transition hover:text-slate-700">
          <span class="material-symbols-outlined text-[18px]">close</span>
        </button>
      </div>
      <div class="mt-3">
        <span class="inline-flex items-center gap-1 rounded-full ${s.badge} px-2 py-0.5 text-[11px] font-bold">
          <span class="h-1.5 w-1.5 rounded-full ${s.dot}"></span>${s.label}
        </span>
      </div>
      <dl class="mt-3 space-y-1.5 text-xs">
        <div class="flex justify-between gap-2"><dt class="text-slate-400">Operador</dt><dd class="truncate font-semibold text-slate-700">${u.operador}</dd></div>
        <div class="flex justify-between gap-2"><dt class="text-slate-400">Ubicación</dt><dd class="truncate font-semibold text-slate-700">${u.zoneName} · ${u.cajon}</dd></div>
      </dl>
      <div class="mt-3.5 grid grid-cols-2 gap-1.5">
        ${actionBtn(u, 'listo', 'Disponible')}
        ${actionBtn(u, 'preparacion', 'Preparación')}
        ${actionBtn(u, 'incidencia', 'Incidencia')}
        ${actionBtn(u, 'asignado', 'Contrato')}
      </div>`;
  }

  function openPopover(unitId, anchor) {
    openUnitId = unitId;
    const pop = $('mg-popover');
    fillPopover(appState.units[unitId]);
    pop.classList.remove('hidden');
    const c = container.getBoundingClientRect();
    const a = anchor.getBoundingClientRect();
    const pw = pop.offsetWidth, ph = pop.offsetHeight;
    let left = a.right - c.left + 8;
    if (left + pw > container.clientWidth - 8) left = a.left - c.left - pw - 8;
    left = Math.max(8, Math.min(left, container.clientWidth - pw - 8));
    let top = a.top - c.top;
    top = Math.max(8, Math.min(top, container.clientHeight - ph - 8));
    pop.style.left = left + 'px';
    pop.style.top = top + 'px';
  }
  function closePopover() { openUnitId = null; $('mg-popover').classList.add('hidden'); }

  // ── Eventos (delegación) ──────────────────────────────────────
  container.addEventListener('click', e => {
    const unit = e.target.closest('[data-unit]');
    if (unit) { openPopover(unit.dataset.unit, unit); return; }
    const act = e.target.closest('[data-set-status]');
    if (act) { setStatus(openUnitId, act.dataset.setStatus, 'Tú'); return; }
    if (e.target.closest('[data-close-pop]')) { closePopover(); return; }
  });
  document.addEventListener('click', e => {
    if (!openUnitId) return;
    if (e.target.closest('#mg-popover') || e.target.closest('[data-unit]')) return;
    closePopover();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closePopover(); });

  // ── Auto-demo (bucle de "tiempo real") ────────────────────────
  let autoOn = true, autoTimer = null;
  function autoTick() {
    if (autoOn) {
      const actor = pick(OPERARIOS);
      const id = pick(Object.keys(appState.units));
      if (Math.random() < 0.55) {
        const u = appState.units[id];
        setStatus(id, pick(STATUS_KEYS.filter(k => k !== u.status)), actor);
      } else if (!moveUnit(id, actor)) {
        const u = appState.units[id];
        setStatus(id, pick(STATUS_KEYS.filter(k => k !== u.status)), actor);
      }
    }
    autoTimer = setTimeout(autoTick, 6000 + Math.random() * 2000);
  }
  $('mg-toggle').addEventListener('click', () => {
    autoOn = !autoOn;
    $('mg-toggle-icon').textContent = autoOn ? 'pause' : 'play_arrow';
    $('mg-toggle-label').textContent = autoOn ? 'Auto-demo' : 'Pausado';
  });

  // ── Init ──────────────────────────────────────────────────────
  renderMap();
  renderMetrics();
  seedFeed();
  autoTimer = setTimeout(autoTick, 6000 + Math.random() * 2000);
})();
</script>
</body>
</html>
