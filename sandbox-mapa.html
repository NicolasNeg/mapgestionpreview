<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="mobile-web-app-capable" content="yes" />
<title>MEX MAPA - Sandbox Mapa BJX</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #111329;
  --panel: #15172e;
  --panel-2: #202742;
  --yard: #263346;
  --slot: rgba(33, 43, 62, .52);
  --slot-border: rgba(137, 152, 181, .22);
  --line: rgba(159, 174, 203, .18);
  --text: #f6f7ff;
  --muted: #8e99b5;
  --soft: #b7c1d9;
  --blue: #2fb1ff;
  --green: #00d489;
  --yellow: #ffd426;
  --pink: #ff5874;
  --cyan: #00c8ff;
  --orange: #ffc16a;
  --purple: #25216f;
  --shadow: 0 24px 70px rgba(0, 0, 0, .42);
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html,
body {
  height: 100%;
  margin: 0;
}

html {
  background: #121329;
}

body {
  overflow: hidden;
  background-color: #121329;
  background:
    radial-gradient(circle at 100% 35%, rgba(86, 55, 156, .42), transparent 34%),
    linear-gradient(180deg, #4b5873 0, #48546d 18%, #222941 18%, #121329 100%);
  color: var(--text);
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  -webkit-font-smoothing: antialiased;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  border: 0;
  cursor: pointer;
}

input,
select,
textarea {
  border: 0;
  outline: 0;
}

.app {
  min-width: 1024px;
  height: 100vh;
  position: relative;
  overflow: hidden;
}

.top-shell {
  height: 185px;
  padding: 30px 24px 0;
  position: relative;
}

.command-bar {
  height: 76px;
  border-radius: 0 0 10px 10px;
  background: #12142a;
  box-shadow: 0 16px 40px rgba(3, 5, 17, .28);
  position: relative;
}

.plaza-card {
  position: absolute;
  left: 12px;
  top: 6px;
  width: 90px;
  height: 64px;
  border-radius: 8px;
  border: 1px solid rgba(255, 255, 255, .18);
  background: rgba(255, 255, 255, .08);
  display: grid;
  place-items: center;
  padding: 8px;
  text-align: center;
}

.plaza-card strong {
  display: block;
  font-size: 12px;
  letter-spacing: .08em;
  line-height: 1;
}

.plaza-card small {
  display: block;
  margin-top: 7px;
  color: #00ff9a;
  font-size: 9px;
  font-weight: 900;
  letter-spacing: .02em;
}

.plaza-card .mini-counts {
  margin-top: 3px;
  display: flex;
  justify-content: center;
  gap: 4px;
  font-size: 9px;
  font-weight: 900;
}

.mini-ok { color: #00ff9a; }
.mini-warn { color: #ffd426; }
.mini-bad { color: #ff5574; }

.scoreboard {
  position: absolute;
  left: 50%;
  top: 2px;
  transform: translateX(-50%);
  min-width: 574px;
  height: 66px;
  padding: 12px 28px;
  border: 1px solid rgba(94, 94, 149, .55);
  border-radius: 18px;
  background: #12142a;
  display: flex;
  align-items: stretch;
  justify-content: center;
  gap: 24px;
}

.metric {
  min-width: 54px;
  display: grid;
  place-items: center;
  text-align: center;
}

.metric + .metric {
  position: relative;
}

.metric + .metric::before {
  content: "";
  position: absolute;
  left: -12px;
  top: 6px;
  width: 1px;
  height: 31px;
  background: rgba(138, 145, 184, .38);
}

.metric strong {
  display: block;
  font-size: 25px;
  line-height: 1;
  font-weight: 900;
  letter-spacing: .01em;
}

.metric span {
  display: block;
  margin-top: 7px;
  color: #969fbd;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: .05em;
  text-transform: uppercase;
  white-space: nowrap;
}

.yard-wrap {
  position: absolute;
  inset: 185px 0 0;
  overflow: hidden;
}

.yard-viewport {
  position: absolute;
  inset: 0;
  overflow: auto;
  border-top: 1px solid rgba(255, 255, 255, .03);
}

.yard-viewport::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}

.yard-viewport::-webkit-scrollbar-track {
  background: rgba(18, 20, 42, .2);
}

.yard-viewport::-webkit-scrollbar-thumb {
  border-radius: 99px;
  background: rgba(114, 123, 155, .82);
}

.yard-stage {
  position: relative;
  width: 1840px;
  height: 930px;
  margin: 0 0 0 20px;
  border-radius: 22px 0 0 0;
  background:
    radial-gradient(circle, rgba(115, 133, 164, .32) 1px, transparent 1.5px) 0 0 / 18px 18px,
    linear-gradient(90deg, rgba(31, 40, 58, .88), rgba(35, 43, 65, .9));
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, .04);
  transform-origin: 0 0;
}

.slot,
.area {
  position: absolute;
}

.slot {
  border: 1px solid var(--slot-border);
  border-radius: 6px;
  background: var(--slot);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, .03);
  transition: border-color .16s ease, background .16s ease, box-shadow .16s ease;
}

.slot.interactive {
  cursor: crosshair;
}

.slot.drop-target,
.slot:hover.interactive {
  border-color: rgba(225, 231, 248, .44);
  background: rgba(43, 55, 78, .70);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, .06), 0 0 0 2px rgba(96, 147, 255, .10);
}

.slot.selected-slot {
  border-color: rgba(255, 255, 255, .58);
  box-shadow: 0 0 0 2px rgba(115, 70, 255, .36), inset 0 1px 0 rgba(255, 255, 255, .08);
}

.slot::before {
  content: attr(data-label);
  position: absolute;
  left: 0;
  right: 0;
  top: -15px;
  color: rgba(189, 198, 219, .62);
  font-size: 9px;
  font-weight: 800;
  letter-spacing: .02em;
  text-align: center;
  text-shadow: 0 1px 2px rgba(0, 0, 0, .45);
}

.slot.wide::before {
  top: -14px;
}

.label-inside {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 6px;
  color: rgba(219, 225, 239, .75);
  font-size: 9px;
  font-weight: 900;
  letter-spacing: .04em;
  text-align: center;
  text-transform: uppercase;
  pointer-events: none;
}

.area {
  border: 1px solid rgba(137, 152, 181, .22);
  border-radius: 6px;
  color: rgba(192, 201, 222, .58);
  font-size: 12px;
  font-weight: 900;
  letter-spacing: .08em;
  text-align: center;
  text-transform: uppercase;
  display: grid;
  place-items: center;
}

.area::before {
  content: attr(data-label);
  position: absolute;
  left: 0;
  right: 0;
  top: -15px;
  font-size: 9px;
  color: rgba(189, 198, 219, .62);
}

.workshop {
  background:
    repeating-linear-gradient(45deg, rgba(147, 159, 188, .10) 0 7px, rgba(8, 12, 28, .18) 7px 16px),
    rgba(21, 28, 44, .52);
  border: 0;
  border-radius: 0;
  font-size: 19px;
  color: rgba(222, 228, 241, .44);
}

.unit {
  position: absolute;
  inset: 5px;
  border-radius: 8px;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  font-weight: 900;
  letter-spacing: .01em;
  text-align: center;
  text-shadow: 0 2px 8px rgba(0, 0, 0, .32);
  box-shadow:
    0 9px 18px rgba(0, 0, 0, .32),
    inset 0 1px 0 rgba(255, 255, 255, .20);
  transition: transform .16s ease, box-shadow .16s ease, outline .16s ease;
  user-select: none;
}

.unit:hover {
  transform: translateY(-2px);
  box-shadow:
    0 14px 24px rgba(0, 0, 0, .38),
    inset 0 1px 0 rgba(255, 255, 255, .24);
}

.unit.selected {
  outline: 2px solid #d9d6ff;
  outline-offset: 3px;
}

.unit.dragging {
  opacity: .45;
}

.unit.blue {
  background: linear-gradient(180deg, #3bb7ff, #1384dd);
}

.unit.green {
  background: linear-gradient(180deg, #09d38d, #08a76e);
}

.unit.gray {
  background: linear-gradient(180deg, #5b657e, #323a51);
  border: 2px dashed rgba(231, 234, 245, .42);
}

.unit.yellow {
  background: linear-gradient(180deg, #ffd34d, #d48a06);
}

.unit.red {
  background: linear-gradient(180deg, #ff647c, #b91c35);
}

.unit.orange {
  background: linear-gradient(180deg, #ffb668, #c56a17);
}

.unit.purple {
  background: linear-gradient(180deg, #9b72ff, #5c35c9);
}

.fuel {
  position: absolute;
  left: 12px;
  right: 12px;
  bottom: 9px;
  height: 10px;
  border-radius: 99px;
  background: rgba(7, 10, 20, .75);
  overflow: hidden;
}

.fuel::after {
  content: attr(data-fuel);
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  color: #eaffd9;
  font-size: 7px;
  font-weight: 900;
}

.fuel i {
  display: block;
  width: var(--fill);
  height: 100%;
  border-radius: inherit;
  background: #19ef6e;
}

.drag-token {
  position: absolute;
  right: -10px;
  top: -8px;
  width: 19px;
  height: 19px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 57% 46%, #00df5f 0 3px, transparent 4px),
    conic-gradient(from 260deg, #7346ff 0 32%, #fff 0 73%, #7346ff 0);
  border: 2px solid rgba(255, 255, 255, .9);
  box-shadow: 0 2px 10px rgba(0, 0, 0, .4);
  opacity: 0;
  pointer-events: none;
  transition: opacity .16s ease;
}

.unit:hover .drag-token,
.unit.selected .drag-token {
  opacity: 1;
}

.unit-popover {
  position: fixed;
  right: 28px;
  top: 132px;
  width: 318px;
  z-index: 40;
  border-radius: 18px;
  border: 1px solid rgba(255, 255, 255, .12);
  background: rgba(20, 22, 44, .94);
  box-shadow: var(--shadow);
  transform: translateX(16px);
  opacity: 0;
  pointer-events: none;
  transition: opacity .18s ease, transform .18s ease;
  overflow: hidden;
}

.unit-popover.open {
  opacity: 1;
  transform: translateX(0);
  pointer-events: auto;
}

.popover-head {
  padding: 18px 18px 14px;
  background: linear-gradient(135deg, #151738, #234fbc);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}

.eyebrow {
  color: rgba(223, 229, 248, .68);
  font-size: 10px;
  font-weight: 900;
  letter-spacing: .12em;
  text-transform: uppercase;
}

.popover-title {
  margin-top: 6px;
  font-size: 25px;
  font-weight: 900;
}

.icon-button {
  width: 32px;
  height: 32px;
  border-radius: 9px;
  background: rgba(255, 255, 255, .11);
  color: #fff;
  display: grid;
  place-items: center;
}

.popover-body {
  padding: 16px 18px 18px;
  display: grid;
  gap: 12px;
}

.field-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.field {
  display: grid;
  gap: 6px;
}

.field.full {
  grid-column: 1 / -1;
}

.field label {
  color: rgba(217, 224, 245, .58);
  font-size: 10px;
  font-weight: 900;
  letter-spacing: .08em;
  text-transform: uppercase;
}

.field input,
.field select,
.field textarea {
  min-width: 0;
  border-radius: 9px;
  border: 1px solid rgba(255, 255, 255, .10);
  background: rgba(255, 255, 255, .08);
  color: #fff;
  padding: 10px 11px;
  font-size: 12px;
  font-weight: 900;
}

.field select option {
  color: #161932;
}

.field textarea {
  min-height: 74px;
  resize: vertical;
  line-height: 1.45;
}

.panel-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 9px;
  padding-top: 4px;
}

.panel-actions button,
.sandbox-toolbar button {
  min-height: 38px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 900;
  letter-spacing: .02em;
}

.primary-action {
  background: #08c884;
  color: #fff;
  box-shadow: 0 10px 22px rgba(8, 200, 132, .22);
}

.secondary-action {
  background: rgba(255, 255, 255, .11);
  color: rgba(242, 245, 255, .86);
}

.danger-action {
  background: rgba(255, 84, 112, .14);
  color: #ff8ca0;
}

.sandbox-toolbar {
  position: fixed;
  left: 26px;
  bottom: 28px;
  z-index: 36;
  display: flex;
  align-items: center;
  gap: 8px;
  max-width: calc(100vw - 160px);
  padding: 9px;
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, .10);
  background: rgba(12, 14, 31, .86);
  box-shadow: 0 18px 36px rgba(0, 0, 0, .35);
  backdrop-filter: blur(12px);
}

.sandbox-mark {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  height: 38px;
  padding: 0 12px;
  border-radius: 11px;
  background: rgba(255, 255, 255, .08);
  color: rgba(239, 242, 255, .78);
  font-size: 11px;
  font-weight: 900;
  letter-spacing: .10em;
}

.sandbox-mark::before {
  content: "";
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #08c884;
  box-shadow: 0 0 0 4px rgba(8, 200, 132, .14);
}

.sandbox-toolbar button {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 0 12px;
  background: rgba(255, 255, 255, .10);
  color: #fff;
}

.sandbox-toolbar button:hover,
.panel-actions button:hover,
.zoom-stack button:hover {
  filter: brightness(1.08);
}

.history-drawer {
  position: fixed;
  left: 26px;
  bottom: 88px;
  width: 344px;
  max-height: 340px;
  z-index: 37;
  display: grid;
  grid-template-rows: auto 1fr;
  border-radius: 17px;
  border: 1px solid rgba(255, 255, 255, .10);
  background: rgba(16, 18, 39, .94);
  box-shadow: var(--shadow);
  overflow: hidden;
  opacity: 0;
  transform: translateY(14px);
  pointer-events: none;
  transition: opacity .18s ease, transform .18s ease;
}

.history-drawer.open {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.history-head {
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 0 14px;
  border-bottom: 1px solid rgba(255, 255, 255, .08);
  color: rgba(235, 239, 255, .92);
  font-size: 12px;
  font-weight: 900;
  letter-spacing: .08em;
  text-transform: uppercase;
}

.history-list {
  overflow: auto;
  padding: 10px;
}

.history-item {
  padding: 10px 11px;
  border-radius: 11px;
  background: rgba(255, 255, 255, .06);
  color: rgba(236, 241, 255, .90);
  font-size: 11px;
  font-weight: 800;
}

.history-item + .history-item {
  margin-top: 7px;
}

.history-item span {
  display: block;
  margin-top: 4px;
  color: rgba(187, 197, 224, .62);
  font-size: 10px;
}

.info-row {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(255, 255, 255, .07);
  color: var(--soft);
  font-size: 12px;
  font-weight: 800;
}

.info-row strong {
  color: #fff;
  text-align: right;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 88px;
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(0, 212, 137, .16);
  color: #32efaa;
  font-size: 11px;
  font-weight: 900;
  letter-spacing: .06em;
  text-transform: uppercase;
}

.summary-modal {
  position: fixed;
  inset: 0;
  z-index: 60;
  display: grid;
  place-items: center;
  padding: 28px;
  background: rgba(9, 10, 26, .60);
  backdrop-filter: blur(7px);
  opacity: 0;
  pointer-events: none;
  transition: opacity .18s ease;
}

.summary-modal.open {
  opacity: 1;
  pointer-events: auto;
}

.summary-card {
  width: min(520px, 100%);
  overflow: hidden;
  border-radius: 22px;
  border: 1px solid rgba(255, 255, 255, .12);
  background: #f6f7fb;
  color: #161932;
  box-shadow: var(--shadow);
}

.summary-head {
  padding: 28px 24px 20px;
  background: linear-gradient(135deg, #15183a, #2755bd);
  color: #fff;
  position: relative;
}

.summary-chip {
  display: inline-flex;
  gap: 5px;
  align-items: center;
  border: 1px solid rgba(255, 255, 255, .20);
  border-radius: 999px;
  padding: 7px 14px;
  background: rgba(16, 18, 42, .50);
  font-size: 11px;
  font-weight: 900;
  letter-spacing: .06em;
}

.summary-chip b {
  color: var(--cyan);
}

.summary-head h2 {
  margin: 12px 0 3px;
  font-size: 27px;
  line-height: 1;
  letter-spacing: -.03em;
}

.summary-head p {
  margin: 0;
  color: rgba(255, 255, 255, .58);
  font-size: 12px;
  font-weight: 900;
  letter-spacing: .04em;
}

.summary-close {
  position: absolute;
  right: 16px;
  top: 16px;
  width: 37px;
  height: 37px;
  border-radius: 50%;
  background: rgba(255, 255, 255, .14);
  color: #fff;
  display: grid;
  place-items: center;
}

.summary-body {
  padding: 16px 22px 24px;
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 24px;
}

.summary-stat,
.summary-wide {
  min-height: 62px;
  border-radius: 14px;
  background: #fff;
  border-left: 4px solid transparent;
  padding: 12px 14px;
  box-shadow: 0 8px 22px rgba(24, 28, 49, .05);
}

.summary-stat span,
.summary-wide span {
  display: block;
  color: #8d98b4;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: .08em;
  text-transform: uppercase;
}

.summary-stat strong,
.summary-wide strong {
  display: block;
  margin-top: 3px;
  font-size: 25px;
  line-height: 1;
  color: #20233d;
}

.summary-wide-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.summary-wide {
  min-height: 102px;
  padding-top: 22px;
}

.summary-foot {
  margin-top: 24px;
  padding-top: 16px;
  border-top: 1px solid #e2e6f0;
  color: #6f7893;
  font-size: 12px;
  font-weight: 900;
  display: flex;
  justify-content: space-between;
}

.zoom-stack {
  position: fixed;
  right: 28px;
  bottom: 39px;
  z-index: 30;
  display: grid;
  gap: 14px;
}

.zoom-stack button {
  width: 60px;
  height: 60px;
  border-radius: 16px;
  background: #f7f5fb;
  color: #2b2092;
  box-shadow: 0 10px 22px rgba(0, 0, 0, .28);
  display: grid;
  place-items: center;
  font-size: 31px;
  font-weight: 900;
}

.toast {
  position: fixed;
  left: 50%;
  bottom: 24px;
  z-index: 80;
  transform: translateX(-50%) translateY(8px);
  min-width: 250px;
  border-radius: 999px;
  padding: 11px 17px;
  background: rgba(10, 12, 27, .92);
  color: #f8f9ff;
  border: 1px solid rgba(255, 255, 255, .12);
  box-shadow: 0 12px 30px rgba(0, 0, 0, .30);
  opacity: 0;
  pointer-events: none;
  text-align: center;
  font-size: 12px;
  font-weight: 900;
  transition: opacity .18s ease, transform .18s ease;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

@media (max-width: 1200px) {
  .app { min-width: 920px; }
  .top-shell { padding-left: 12px; padding-right: 12px; }
  .scoreboard { min-width: 520px; gap: 18px; }
}
</style>
</head>
<body>
<div class="app">
  <header class="top-shell" aria-label="Resumen del mapa">
    <div class="command-bar">
      <button class="plaza-card" type="button" onclick="openSummary()" aria-label="Abrir resumen de BJX">
        <span>
          <strong>BJX</strong>
          <small id="plazaOccupied">0% ocupado</small>
          <span class="mini-counts" aria-hidden="true">
            <span class="mini-ok" id="miniListo">1</span>
            <span class="mini-warn" id="miniSucio">0</span>
            <span class="mini-bad" id="miniManto">0</span>
          </span>
        </span>

<script>
const stage = document.getElementById('yardStage');
const viewport = document.getElementById('yardViewport');
const popover = document.getElementById('unitPopover');
const historyDrawer = document.getElementById('historyDrawer');
const historyList = document.getElementById('historyList');
const slotField = document.getElementById('unitSlotField');
const STORAGE_KEY = 'mex-mapa:sandbox-bjx:v2';
const STATUS_STYLE = {
  'LISTO': 'green',
  'SUCIO': 'yellow',
  'MANTENIMIENTO': 'red',
  'NO ARRENDABLE': 'blue',
  'EN TALLER': 'orange',
  'TRASLADO': 'purple',
};
const STATUS_LABEL = {
  'LISTO': 'Listo',
  'SUCIO': 'Sucio',
  'MANTENIMIENTO': 'Manto',
  'NO ARRENDABLE': 'No arrendable',
  'EN TALLER': 'En taller',
  'TRASLADO': 'Traslado',
};
let currentScale = 1;
let toastTimer = 0;
let selectedUnitId = '';
let editorMode = 'edit';
let draggingUnitId = '';
let state = null;

function getSlotId(slot) {
  return (slot?.dataset?.label || '').trim();
}

const slotNodes = Array.from(document.querySelectorAll('.slot')).filter((slot) => getSlotId(slot));
const slotIds = slotNodes.map((slot) => getSlotId(slot));

function slotNode(slotId) {
  return slotNodes.find((slot) => getSlotId(slot) === slotId);
}

function placeForSlot(slotId) {
  if (slotId.startsWith('TLLRS')) return 'Taller';
  if (slotId.startsWith('B-')) return 'Bano';
  if (slotId.startsWith('L')) return 'Limbo';
  if (slotId.startsWith('OFICINA')) return 'Oficina';
  return 'Patio';
}

function fuelFill(fuel) {
  return {
    'F': '100%',
    '3/4': '75%',
    '1/2': '50%',
    '1/4': '25%',
    'E': '0%',
    'N/A': '0%',
    '': '0%',
  }[fuel] || '0%';
}

function nowLabel() {
  return new Date().toLocaleString('es-MX', {
    day: 'numeric',
    month: 'numeric',
    year: 'numeric',
    hour: 'numeric',
    minute: '2-digit',
  });
}

function captureInitialState() {
  const units = {};
  document.querySelectorAll('.unit').forEach((button) => {
    const slot = button.closest('.slot');
    const slotId = getSlotId(slot);
    if (!slotId || !button.dataset.id) return;
    const unitId = button.dataset.id.trim().toUpperCase();
    const color = ['blue', 'green', 'gray', 'yellow', 'red', 'orange', 'purple'].find((name) => button.classList.contains(name)) || '';
    units[unitId] = {
      id: unitId,
      slot: slotId,
      status: button.dataset.status || 'NO ARRENDABLE',
      fuel: button.dataset.fuel || 'N/A',
      place: button.dataset.place || placeForSlot(slotId),
      model: button.dataset.model || '',
      plates: button.dataset.plates || '',
      notes: '',
      color,
      savedAt: '19/4/2026, 5:51 p.m.',
    };
  });
  return {
    version: 2,
    units,
    history: [
      { action: 'Carga inicial', detail: 'Sandbox BJX sincronizado con captura real', at: nowLabel() },
    ],
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return captureInitialState();
    const parsed = JSON.parse(raw);
    if (!parsed || parsed.version !== 2 || !parsed.units) return captureInitialState();
    return parsed;
  } catch {
    return captureInitialState();
  }
}

function persistState(showMessage = false) {
  const payload = {
    version: 2,
    units: state.units,
    history: state.history.slice(0, 80),
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
  if (showMessage) showToast('Cambios guardados en este sandbox');
}

function saveSandbox() {
  Object.values(state.units).forEach((unit) => {
    unit.savedAt = nowLabel();
  });
  addHistory('Guardado', 'Cambios persistidos localmente');
  persistState(true);
  renderAll();
}

function resetSandbox() {
  localStorage.removeItem(STORAGE_KEY);
  state = captureInitialState();
  selectedUnitId = '';
  editorMode = 'edit';
  closeUnit();
  renderAll();
  persistState();
  showToast('Sandbox restaurado');
}

function statusClass(unit) {
  return unit.color || STATUS_STYLE[unit.status] || 'gray';
}

function createUnitElement(unit) {
  const button = document.createElement('button');
  button.className = `unit ${statusClass(unit)}`;
  button.type = 'button';
  button.draggable = true;
  button.dataset.id = unit.id;
  button.dataset.slot = unit.slot;
  button.dataset.status = unit.status;
  button.dataset.place = unit.place || placeForSlot(unit.slot);
  button.dataset.fuel = unit.fuel || 'N/A';
  button.style.fontSize = unit.id.length > 7 ? '14px' : '';
  button.textContent = unit.id;
  if (unit.id === selectedUnitId) button.classList.add('selected');

  if (unit.fuel && unit.fuel !== 'N/A') {
    const fuel = document.createElement('span');
    fuel.className = 'fuel';
    fuel.dataset.fuel = unit.fuel;
    const fill = document.createElement('i');
    fill.style.setProperty('--fill', fuelFill(unit.fuel));
    fuel.appendChild(fill);
    button.appendChild(fuel);
  }

  const token = document.createElement('span');
  token.className = 'drag-token';
  token.setAttribute('aria-hidden', 'true');
  button.appendChild(token);

  button.addEventListener('click', (event) => {
    event.stopPropagation();
    selectUnit(unit.id);
  });
  button.addEventListener('dragstart', (event) => {
    draggingUnitId = unit.id;
    button.classList.add('dragging');
    event.dataTransfer.setData('text/plain', unit.id);
    event.dataTransfer.effectAllowed = 'move';
  });
  button.addEventListener('dragend', () => {
    draggingUnitId = '';
    button.classList.remove('dragging');
    slotNodes.forEach((slot) => slot.classList.remove('drop-target'));
  });
  return button;
}

function renderAll() {
  document.querySelectorAll('.unit').forEach((unit) => unit.remove());
  slotNodes.forEach((slot) => slot.classList.toggle('selected-slot', getSlotId(slot) === state.units[selectedUnitId]?.slot));
  Object.values(state.units).forEach((unit) => {
    const target = slotNode(unit.slot);
    if (target) target.appendChild(createUnitElement(unit));
  });
  fillSlotOptions();
  renderHistory();
  updateSummary();
}

function fillSlotOptions() {
  const current = slotField.value;
  slotField.innerHTML = slotIds.map((slotId) => `<option value="${slotId}">${slotId}</option>`).join('');
  if (current && slotIds.includes(current)) slotField.value = current;
}

function selectUnit(target) {
  const unitId = typeof target === 'string' ? target : target?.dataset?.id;
  if (!unitId || !state.units[unitId]) return;
  selectedUnitId = unitId;
  editorMode = 'edit';
  openEditor(state.units[unitId]);
  renderAll();
  showToast(`${unitId} seleccionado`);
}

function openEditor(unit) {
  document.getElementById('editorMode').textContent = editorMode === 'add' ? 'Nuevo vehiculo' : `${unit.place || placeForSlot(unit.slot)} · ${unit.slot}`;
  document.getElementById('unitTitle').textContent = unit.id || 'Nuevo';
  document.getElementById('unitMva').value = unit.id || '';
  document.getElementById('unitSlotField').value = unit.slot || firstEmptySlot();
  document.getElementById('unitStatusField').value = unit.status || 'LISTO';
  document.getElementById('unitFuelField').value = unit.fuel || 'F';
  document.getElementById('unitPlaceField').value = unit.place || placeForSlot(unit.slot || firstEmptySlot());
  document.getElementById('unitPlatesField').value = unit.plates || '';
  document.getElementById('unitModelField').value = unit.model || '';
  document.getElementById('unitNotesField').value = unit.notes || '';
  document.getElementById('unitSavedAt').textContent = unit.savedAt || 'Sin guardar';
  popover.classList.add('open');
}

function closeUnit() {
  popover.classList.remove('open');
  editorMode = 'edit';
  document.querySelectorAll('.unit.selected').forEach((unit) => unit.classList.remove('selected'));
  slotNodes.forEach((slot) => slot.classList.remove('selected-slot'));
}

function firstEmptySlot() {
  return slotIds.find((slotId) => !Object.values(state.units).some((unit) => unit.slot === slotId)) || slotIds[0];
}

function openAdd(preferredSlot = '') {
  selectedUnitId = '';
  editorMode = 'add';
  const slot = preferredSlot || firstEmptySlot();
  openEditor({
    id: nextMva(),
    slot,
    status: 'LISTO',
    fuel: 'F',
    place: placeForSlot(slot),
    model: 'Demo 2026',
    plates: '',
    notes: '',
    savedAt: 'Sin guardar',
  });
}

function nextMva() {
  let index = 1;
  while (state.units[`DEMO${String(index).padStart(2, '0')}`]) index++;
  return `DEMO${String(index).padStart(2, '0')}`;
}

function readEditorUnit() {
  const id = document.getElementById('unitMva').value.trim().toUpperCase().replace(/\s+/g, '');
  const slot = document.getElementById('unitSlotField').value;
  return {
    id,
    slot,
    status: document.getElementById('unitStatusField').value,
    fuel: document.getElementById('unitFuelField').value,
    place: document.getElementById('unitPlaceField').value.trim() || placeForSlot(slot),
    plates: document.getElementById('unitPlatesField').value.trim().toUpperCase(),
    model: document.getElementById('unitModelField').value.trim(),
    notes: document.getElementById('unitNotesField').value.trim(),
    color: STATUS_STYLE[document.getElementById('unitStatusField').value] || 'gray',
    savedAt: nowLabel(),
  };
}

function saveEditor() {
  const unit = readEditorUnit();
  if (!unit.id) {
    showToast('MVA requerido');
    return;
  }

  const oldId = selectedUnitId;
  const existingById = state.units[unit.id];
  if (editorMode === 'add' && existingById) {
    showToast('Ese MVA ya existe');
    return;
  }
  if (editorMode === 'edit' && existingById && unit.id !== oldId) {
    showToast('Ese MVA ya existe');
    return;
  }

  const occupied = Object.values(state.units).find((candidate) => candidate.slot === unit.slot && candidate.id !== oldId);
  if (editorMode === 'add' && occupied) {
    showToast(`El cajon ${unit.slot} ya esta ocupado`);
    return;
  }

  if (editorMode === 'edit' && occupied && oldId && state.units[oldId]) {
    occupied.slot = state.units[oldId].slot;
    occupied.place = placeForSlot(occupied.slot);
    occupied.savedAt = nowLabel();
    addHistory('Swap', `${unit.id} ${state.units[oldId].slot} -> ${unit.slot} · ${occupied.id} -> ${occupied.slot}`);
  }

  if (editorMode === 'edit' && oldId && oldId !== unit.id) delete state.units[oldId];
  state.units[unit.id] = unit;
  selectedUnitId = unit.id;
  addHistory(editorMode === 'add' ? 'Alta' : 'Edicion', `${unit.id} · ${unit.slot}`);
  editorMode = 'edit';
  persistState();
  renderAll();
  selectUnit(unit.id);
  showToast(`${unit.id} guardado`);
}

function deleteSelected() {
  if (!selectedUnitId || !state.units[selectedUnitId]) return;
  const removed = state.units[selectedUnitId];
  delete state.units[selectedUnitId];
  addHistory('Baja', `${removed.id} removido de ${removed.slot}`);
  selectedUnitId = '';
  closeUnit();
  persistState();
  renderAll();
  showToast('Unidad eliminada');
}

function duplicateSelected() {
  const source = selectedUnitId ? state.units[selectedUnitId] : null;
  if (!source) {
    showToast('Selecciona una unidad');
    return;
  }
  const slot = firstEmptySlot();
  if (!slot) {
    showToast('Sin cajones libres');
    return;
  }
  const clone = {
    ...source,
    id: nextMva(),
    slot,
    place: placeForSlot(slot),
    savedAt: nowLabel(),
  };
  state.units[clone.id] = clone;
  selectedUnitId = clone.id;
  addHistory('Duplicado', `${source.id} -> ${clone.id} en ${slot}`);
  persistState();
  renderAll();
  selectUnit(clone.id);
}

function moveUnit(unitId, targetSlot) {
  const unit = state.units[unitId];
  if (!unit || !slotIds.includes(targetSlot) || unit.slot === targetSlot) return;
  const originSlot = unit.slot;
  const occupied = Object.values(state.units).find((candidate) => candidate.slot === targetSlot && candidate.id !== unitId);
  if (occupied) {
    occupied.slot = originSlot;
    occupied.place = placeForSlot(originSlot);
    occupied.savedAt = nowLabel();
    addHistory('Swap', `${unit.id} ${originSlot} -> ${targetSlot} · ${occupied.id} -> ${originSlot}`);
  } else {
    addHistory('Movimiento', `${unit.id} ${originSlot} -> ${targetSlot}`);
  }
  unit.slot = targetSlot;
  unit.place = placeForSlot(targetSlot);
  if (targetSlot.startsWith('TLLRS')) {
    unit.status = 'EN TALLER';
    unit.color = STATUS_STYLE[unit.status];
  }
  unit.savedAt = nowLabel();
  selectedUnitId = unit.id;
  persistState();
  renderAll();
  selectUnit(unit.id);
}

function bindSlotInteractions() {
  slotNodes.forEach((slot) => {
    const slotId = getSlotId(slot);
    slot.classList.add('interactive');
    slot.addEventListener('click', (event) => {
      if (event.target.closest('.unit')) return;
      if (selectedUnitId && state.units[selectedUnitId]) {
        moveUnit(selectedUnitId, slotId);
      } else {
        openAdd(slotId);
      }
    });
    slot.addEventListener('dragover', (event) => {
      event.preventDefault();
      event.dataTransfer.dropEffect = 'move';
      slot.classList.add('drop-target');
    });
    slot.addEventListener('dragleave', () => {
      slot.classList.remove('drop-target');
    });
    slot.addEventListener('drop', (event) => {
      event.preventDefault();
      slot.classList.remove('drop-target');
      const unitId = event.dataTransfer.getData('text/plain') || draggingUnitId;
      moveUnit(unitId, slotId);
    });
  });
}

function addHistory(action, detail) {
  if (!Array.isArray(state.history)) state.history = [];
  state.history.unshift({ action, detail, at: nowLabel() });
  state.history = state.history.slice(0, 80);
  renderHistory();
}

function renderHistory() {
  const items = state.history || [];
  historyList.innerHTML = items.length
    ? items.slice(0, 24).map((item) => `<div class="history-item">${item.action}<span>${item.detail} · ${item.at}</span></div>`).join('')
    : '<div class="history-item">Sin movimientos<span>Los cambios del sandbox apareceran aqui.</span></div>';
}

function toggleHistory() {
  historyDrawer.classList.toggle('open');
}

function updateSummary() {
  const units = Object.values(state.units);
  const total = units.length;
  const listo = units.filter((unit) => unit.status === 'LISTO').length;
  const sucio = units.filter((unit) => unit.status === 'SUCIO').length;
  const manto = units.filter((unit) => unit.status === 'MANTENIMIENTO').length;
  const taller = units.filter((unit) => unit.status === 'EN TALLER' || unit.slot.startsWith('TLLRS')).length;
  const patio = total - taller;
  const noRent = units.filter((unit) => unit.status === 'NO ARRENDABLE').length;
  const occupied = Math.round((total / slotIds.length) * 100);

  document.getElementById('metricTotal').textContent = total;
  document.getElementById('metricListo').textContent = listo;
  document.getElementById('metricSucio').textContent = sucio;
  document.getElementById('metricManto').textContent = manto;
  document.getElementById('metricPatio').textContent = patio;
  document.getElementById('metricTaller').textContent = taller;
  document.getElementById('plazaOccupied').textContent = `${occupied}% ocupado`;
  document.getElementById('miniListo').textContent = listo;
  document.getElementById('miniSucio').textContent = sucio;
  document.getElementById('miniManto').textContent = manto;
  document.getElementById('summaryTotal').textContent = total;
  document.getElementById('summaryPatio').textContent = patio;
  document.getElementById('summaryFuera').textContent = 0;
  document.getElementById('summaryNoRent').textContent = noRent;
  document.getElementById('summaryListo').textContent = listo;
  document.getElementById('summaryFooterTotal').textContent = patio;
  document.getElementById('summaryClock').textContent = new Date().toLocaleTimeString('es-MX', {
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
  });
}

function zoomMap(factor) {
  currentScale = Math.max(.72, Math.min(1.45, currentScale * factor));
  stage.style.transform = `scale(${currentScale})`;
  stage.style.width = `${1840 * currentScale}px`;
  stage.style.height = `${930 * currentScale}px`;
}

function openSummary() {
  document.getElementById('summaryModal').classList.add('open');
}

function closeSummary() {
  document.getElementById('summaryModal').classList.remove('open');
}

function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
}

document.addEventListener('keydown', (event) => {
  if (event.key === 'Escape') {
    closeSummary();
    closeUnit();
    historyDrawer.classList.remove('open');
  }
  if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 's') {
    event.preventDefault();
    saveSandbox();
  }
  if (!event.ctrlKey && !event.metaKey && event.key.toLowerCase() === 'n') {
    const target = event.target;
    if (target?.tagName !== 'INPUT' && target?.tagName !== 'TEXTAREA' && target?.tagName !== 'SELECT') openAdd();
  }
});

document.getElementById('summaryModal').addEventListener('click', (event) => {
  if (event.target.id === 'summaryModal') closeSummary();
});

state = loadState();
bindSlotInteractions();
renderAll();
persistState();
viewport.scrollTo({ left: 0, top: 0 });
</script>
</body>
</html>
